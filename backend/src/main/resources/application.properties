spring.application.name=backend
server.port=${PORT:8080}

# CORS: comma-separated origins/patterns (override in prod via CORS_ORIGINS)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Local dev: in-memory H2 (production uses application-prod.properties + PostgreSQL)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Email (optional). app.mail.enabled=true plus either:
# - POSTMARK_SERVER_TOKEN → HTTPS API (works on hosts that block SMTP, e.g. Render free)
# - spring.mail.host + credentials → SMTP (skipped when POSTMARK_SERVER_TOKEN is set)
# Prefer MAIL_* / ADMIN_* on Render; APP_MAIL_* matches Spring relaxed binding if you set keys that way.
app.mail.enabled=${MAIL_ENABLED:${APP_MAIL_ENABLED:false}}
app.mail.from=${MAIL_FROM:${APP_MAIL_FROM:${POSTMARK_FROM:${POSTMARK_SENDER_EMAIL:noreply@localhost}}}}
app.mail.admin-notify=${ADMIN_NOTIFY_EMAIL:${APP_MAIL_ADMIN_NOTIFY:}}
app.mail.app-name=${APP_DISPLAY_NAME:${APP_MAIL_APP_NAME:ResolvIQ}}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

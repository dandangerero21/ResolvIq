spring.application.name=backend
server.port=${PORT:8080}

# CORS: comma-separated origins/patterns (override in prod via CORS_ORIGINS)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Local dev: in-memory H2 (production uses application-prod.properties + PostgreSQL)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Email (optional). Set app.mail.enabled=true and SMTP vars to notify admins/applicants.
app.mail.enabled=false
app.mail.from=${MAIL_FROM:noreply@localhost}
app.mail.admin-notify=${ADMIN_NOTIFY_EMAIL:}
app.mail.app-name=${APP_DISPLAY_NAME:ResolvIQ}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

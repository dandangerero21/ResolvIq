# Active when SPRING_PROFILES_ACTIVE=prod (e.g. Render)
# Set real values only in the host environment — never commit secrets here.

spring.h2.console.enabled=false

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Optional SMTP: set MAIL_ENABLED=true and MAIL_* / ADMIN_NOTIFY_EMAIL in the host environment.
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:noreply@example.com}
app.mail.admin-notify=${ADMIN_NOTIFY_EMAIL:}
app.mail.app-name=${APP_DISPLAY_NAME:ResolvIQ}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

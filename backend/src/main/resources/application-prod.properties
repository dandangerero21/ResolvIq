# Active when SPRING_PROFILES_ACTIVE=prod (e.g. Render)
# Set real values only in the host environment — never commit secrets here.

spring.h2.console.enabled=false

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Mail: MAIL_ENABLED=true (or APP_MAIL_ENABLED=true), MAIL_FROM, ADMIN_NOTIFY_EMAIL (or APP_MAIL_ADMIN_NOTIFY).
# Postmark: use the Server API token from a **Live** server. Sandbox servers accept API calls but do not deliver to real inboxes.
# POSTMARK_SERVER_TOKEN — HTTPS :443 (works on Render free). SMTP not used when this is set.
app.mail.enabled=${MAIL_ENABLED:${APP_MAIL_ENABLED:false}}
app.mail.from=${MAIL_FROM:${APP_MAIL_FROM:${POSTMARK_FROM:${POSTMARK_SENDER_EMAIL:noreply@example.com}}}}
app.mail.admin-notify=${ADMIN_NOTIFY_EMAIL:${APP_MAIL_ADMIN_NOTIFY:}}
app.mail.app-name=${APP_DISPLAY_NAME:${APP_MAIL_APP_NAME:ResolvIQ}}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

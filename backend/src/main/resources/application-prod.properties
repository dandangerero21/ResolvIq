# Active when SPRING_PROFILES_ACTIVE=prod (e.g. Render)
# Set real values only in the host environment — never commit secrets here.

spring.h2.console.enabled=false

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Mail: MAIL_ENABLED=true, MAIL_FROM, ADMIN_NOTIFY_EMAIL, APP_DISPLAY_NAME as needed.
# Postmark on Render: set POSTMARK_SERVER_TOKEN (Server API token). Uses HTTPS :443 — no SMTP.
# Do not rely on MAIL_HOST for Postmark; SMTP bean is disabled when POSTMARK_SERVER_TOKEN is set.
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:noreply@example.com}
app.mail.admin-notify=${ADMIN_NOTIFY_EMAIL:}
app.mail.app-name=${APP_DISPLAY_NAME:ResolvIQ}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1220" viewBox="0 0 1700 1220" role="img" aria-label="ResolvIQ activity flowchart">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .node { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 12; ry: 12; }
      .decision { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; }
      .line { stroke: #1f2937; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .label { font-family: Segoe UI, Arial, sans-serif; font-size: 22px; font-weight: 600; fill: #0f172a; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #1e293b; }
      .edge { font-family: Segoe UI, Arial, sans-serif; font-size: 17px; font-weight: 600; fill: #0f172a; }
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1700" height="1220"/>
  <text class="title" x="850" y="44" text-anchor="middle">ResolvIQ Activity Diagram</text>

  <rect class="node" x="700" y="70" width="300" height="70"/>
  <text class="label" x="850" y="113" text-anchor="middle">User opens platform</text>

  <polygon class="decision" points="850,170 940,250 850,330 760,250"/>
  <text class="small" x="850" y="257" text-anchor="middle">Authenticate</text>

  <rect class="node" x="260" y="390" width="260" height="70"/>
  <text class="label" x="390" y="433" text-anchor="middle">User Dashboard</text>

  <rect class="node" x="720" y="390" width="260" height="70"/>
  <text class="label" x="850" y="433" text-anchor="middle">Staff Dashboard</text>

  <rect class="node" x="1180" y="390" width="260" height="70"/>
  <text class="label" x="1310" y="433" text-anchor="middle">Admin Dashboard</text>

  <rect class="node" x="260" y="530" width="260" height="70"/>
  <text class="label" x="390" y="573" text-anchor="middle">Submit Complaint</text>

  <rect class="node" x="260" y="670" width="260" height="70"/>
  <text class="small" x="390" y="706" text-anchor="middle">Complaint stored as Open</text>

  <rect class="node" x="1180" y="530" width="260" height="70"/>
  <text class="small" x="1310" y="566" text-anchor="middle">Review Complaint Queue</text>

  <rect class="node" x="1180" y="670" width="260" height="70"/>
  <text class="small" x="1310" y="706" text-anchor="middle">Assign Complaint to Staff</text>

  <rect class="node" x="720" y="530" width="260" height="70"/>
  <text class="small" x="850" y="566" text-anchor="middle">Receive Assignment</text>

  <rect class="node" x="720" y="670" width="260" height="70"/>
  <text class="small" x="850" y="706" text-anchor="middle">Discuss in Complaint</text>
  <text class="small" x="850" y="730" text-anchor="middle">Conversation</text>

  <polygon class="decision" points="850,810 960,890 850,970 740,890"/>
  <text class="small" x="850" y="885" text-anchor="middle">Resolution</text>
  <text class="small" x="850" y="909" text-anchor="middle">Outcome</text>

  <rect class="node" x="720" y="1020" width="260" height="70"/>
  <text class="small" x="850" y="1056" text-anchor="middle">Update Status to Resolved</text>

  <rect class="node" x="720" y="1110" width="260" height="70"/>
  <text class="small" x="850" y="1146" text-anchor="middle">User submits Rating and</text>
  <text class="small" x="850" y="1170" text-anchor="middle">Feedback</text>

  <rect class="node" x="1120" y="1110" width="320" height="70"/>
  <text class="small" x="1280" y="1146" text-anchor="middle">Admin views performance and</text>
  <text class="small" x="1280" y="1170" text-anchor="middle">quality signals</text>

  <line class="line" x1="850" y1="140" x2="850" y2="170"/>

  <path class="line" d="M760 250 L390 250 L390 390"/>
  <path class="line" d="M850 330 L850 390"/>
  <path class="line" d="M940 250 L1310 250 L1310 390"/>

  <line class="line" x1="390" y1="460" x2="390" y2="530"/>
  <line class="line" x1="390" y1="600" x2="390" y2="670"/>

  <line class="line" x1="1310" y1="460" x2="1310" y2="530"/>
  <line class="line" x1="1310" y1="600" x2="1310" y2="670"/>

  <line class="line" x1="850" y1="460" x2="850" y2="530"/>
  <line class="line" x1="850" y1="600" x2="850" y2="670"/>
  <line class="line" x1="850" y1="740" x2="850" y2="810"/>

  <line class="line" x1="850" y1="970" x2="850" y2="1020"/>
  <line class="line" x1="850" y1="1090" x2="850" y2="1110"/>
  <line class="line" x1="980" y1="1145" x2="1120" y2="1145"/>

  <path class="line" d="M960 890 L1510 890 L1510 495 L1440 495"/>

  <text class="edge" x="500" y="238">User</text>
  <text class="edge" x="866" y="372">Staff</text>
  <text class="edge" x="1180" y="238">Admin</text>
  <text class="edge" x="875" y="999">Resolved</text>
  <text class="edge" x="1360" y="872">Escalated or Reassigned</text>
</svg>
